# Cloudflare Workers/Pages 构建配置
# 此文件用于 Cloudflare 连接 GitHub 自动部署时的构建配置

name: "Cloud Mail Build"

# 构建命令
build:
  command: "cd ../mail-vue && pnpm install && pnpm run build"
  cwd: "."

# 输出目录
output:
  directory: "./dist"

# Node.js 版本
node_version: "20"

# 环境变量
# 在 Cloudflare Dashboard 中设置
# - domain: ["your-domain.com"]
# - admin: admin@example.com
# - jwt_secret: your-secret-key (设置为 Secret 类型)
